apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-copilot

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-devops-copilot

  template:
    metadata:
      labels:
        app: ai-devops-copilot

    spec:
      containers:
      - name: ai-devops-copilot

        image: ai-devops-copilot:latest

        ports:
        - containerPort: 8501